---
# Add VLAN 99 management IP to switch (dual-homed)
#
# Usage: make migration-switch-mgmt-ip
#
# Adds a VLAN 99 management interface to the switch so it remains
# reachable after the builder moves to VLAN 99 in Step 5. The switch
# is temporarily dual-homed on both VLAN 1 (192.168.10.10) and
# VLAN 99 (10.20.99.10). VLAN 1 is removed later in Step 11.
#
# Read-write — adds an IP to the switch management plane.
# Rollback: no interface vlan 99

- name: "Migration Step 5a: Add VLAN 99 management IP to switch"
  hosts: switches
  gather_facts: false
  vars:
    switch_mgmt_vlan: 99
    switch_mgmt_ip: "10.20.99.10"
    switch_mgmt_mask: "255.255.255.0"
  tasks:
    - name: Add VLAN 99 management interface
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      loop:
        - "configure"
        - "interface vlan {{ switch_mgmt_vlan }}"
        - "ip address {{ switch_mgmt_ip }} {{ switch_mgmt_mask }}"
        - "exit"
        - "end"
      loop_control:
        label: "{{ item }}"
      changed_when: true
      notify: write memory

    - name: Verify switch is reachable on new IP
      ansible.builtin.command:
        cmd: "ping -c 2 -W 3 {{ switch_mgmt_ip }}"
      delegate_to: localhost
      register: ping_result
      ignore_errors: true
      changed_when: false

    - name: Display result
      ansible.builtin.debug:
        msg: >-
          {{ '[PASS]' if ping_result.rc == 0 else '[WARN]' }}
          Switch {{ inventory_hostname }} at {{ switch_mgmt_ip }} —
          {{ 'reachable on VLAN ' ~ switch_mgmt_vlan if ping_result.rc == 0
             else 'not yet reachable (VLAN ' ~ switch_mgmt_vlan ~ ' gateway may not be configured yet)' }}

  handlers:
    - name: write memory
      ansible.netcommon.cli_command:
        command: "copy running-config startup-config"
