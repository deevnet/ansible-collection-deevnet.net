---
# Phase 8: Migrate remaining access ports to VLANs
#
# Moves all remaining switch ports to their assigned VLANs.
# Run after firewall rules are confirmed working on new subnets.
#
# Usage: make migration-switch-access-ports
# Credentials come from inventory vault (group_vars/switches/vault.yml)
#
# Verify: Each device gets correct VLAN/IP, check show vlan brief
# Rollback: switchport access vlan 1 on affected ports

- name: "Migration Phase 8: Migrate remaining access ports to VLANs"
  hosts: switches
  gather_facts: false
  tasks:
    - name: Configure access ports
      ansible.builtin.include_role:
        name: switch_vlans
        tasks_from: configure_access_ports.yml
      tags: [access]

  handlers:
    - name: write memory
      ansible.netcommon.cli_command:
        command: "copy running-config startup-config"
