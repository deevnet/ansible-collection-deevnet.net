---
# Set trunk PVID to blackhole (999) on router uplink
#
# Usage: make migration-switch-trunk-pvid
#
# This MUST run AFTER OPNsense VLAN interfaces have IPs (Step 8),
# because changing PVID from 1 to 999 makes the router's untagged
# (VLAN 1) traffic land in the blackhole VLAN. The router must be
# reachable via tagged VLAN interfaces before this step.
#
# After this step, untagged traffic on the trunk goes to VLAN 999.
# Rollback: switchport pvid 1 on gigabitEthernet 1/0/1

- name: "Migration: Set trunk PVID to blackhole"
  hosts: switches
  gather_facts: false
  tasks:
    - name: Set PVID to 999 on router uplink
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      loop:
        - "configure"
        - "interface gigabitEthernet 1/0/1"
        - "switchport pvid 999"
        - "exit"
        - "end"
      loop_control:
        label: "{{ item }}"
      changed_when: true
      notify: write memory

    - name: Verify trunk PVID
      ansible.netcommon.cli_command:
        command: "show interface switchport gigabitEthernet 1/0/1"
      register: trunk_info

    - name: Display trunk status
      ansible.builtin.debug:
        msg: "{{ trunk_info.stdout }}"

  handlers:
    - name: write memory
      ansible.netcommon.cli_command:
        command: "copy running-config startup-config"
