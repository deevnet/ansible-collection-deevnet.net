---
# Step 13: Configure SSID-to-VLAN mappings via Omada API
#
# Usage: make migration-omada-ssids
#
# Creates WiFi SSIDs for each VLAN with wifi_ssid defined in deevnet_vlans.
# WiFi PSKs come from deevnet_wifi_psk in vault (group_vars/all/vault.yml).

- name: "Migration Step 13: Configure Omada SSIDs"
  hosts: network_controllers
  gather_facts: false
  vars:
    _omada_url: "https://localhost:8043"
    _cookie_file: "/tmp/.omada_session"
  tasks:
    # --- Login and save session cookie ---
    - name: Login to Omada controller
      ansible.builtin.command:
        cmd: >
          curl -sk -c {{ _cookie_file }}
          -H "Content-Type: application/json"
          -X POST "{{ _omada_url }}/api/v2/login"
          -d '{"username":"{{ omada_admin_user }}","password":"{{ omada_admin_password }}"}'
      register: _login_raw
      changed_when: false
      no_log: true

    - name: Parse login response
      ansible.builtin.set_fact:
        _login: "{{ _login_raw.stdout | from_json }}"

    - name: Extract auth details
      ansible.builtin.set_fact:
        _omada_token: "{{ _login.result.token }}"
        _omadac_id: "{{ _login.result.omadacId }}"

    - name: Fail if login failed
      ansible.builtin.fail:
        msg: "Omada login failed: {{ _login.msg }}"
      when: _login.errorCode != 0

    # --- Get site ID ---
    - name: Get sites
      ansible.builtin.command:
        cmd: >
          curl -sk -b {{ _cookie_file }}
          -H "Csrf-Token: {{ _omada_token }}"
          "{{ _omada_url }}/{{ _omadac_id }}/api/v2/sites?currentPageSize=100&currentPage=1"
      register: _sites_raw
      changed_when: false

    - name: Extract site ID
      ansible.builtin.set_fact:
        _site_id: "{{ (_sites_raw.stdout | from_json).result.data[0].id }}"

    # --- Get default WLAN group ---
    - name: Get WLAN groups
      ansible.builtin.command:
        cmd: >
          curl -sk -b {{ _cookie_file }}
          -H "Csrf-Token: {{ _omada_token }}"
          "{{ _omada_url }}/{{ _omadac_id }}/api/v2/sites/{{ _site_id }}/setting/wlans?currentPageSize=100&currentPage=1"
      register: _wlans_raw
      changed_when: false

    - name: Extract default WLAN group ID
      ansible.builtin.set_fact:
        _wlan_id: "{{ (_wlans_raw.stdout | from_json).result.data[0].id }}"

    # --- Get existing SSIDs ---
    - name: Get existing SSIDs
      ansible.builtin.command:
        cmd: >
          curl -sk -b {{ _cookie_file }}
          -H "Csrf-Token: {{ _omada_token }}"
          "{{ _omada_url }}/{{ _omadac_id }}/api/v2/sites/{{ _site_id }}/setting/wlans/{{ _wlan_id }}/ssids?currentPageSize=100&currentPage=1"
      register: _ssids_raw
      changed_when: false

    - name: Build existing SSID name list
      ansible.builtin.set_fact:
        _existing_ssid_names: "{{ (_ssids_raw.stdout | from_json).result.data | map(attribute='name') | list }}"

    - name: Display existing SSIDs
      ansible.builtin.debug:
        msg: "Existing SSIDs: {{ _existing_ssid_names }}"

    # --- Create SSIDs for VLANs ---
    - name: Build list of SSIDs to create
      ansible.builtin.set_fact:
        _ssids_to_create: >-
          {{ deevnet_vlans | dict2items
             | selectattr('value.wifi_ssid', 'defined')
             | rejectattr('value.wifi_ssid', 'in', _existing_ssid_names)
             | list }}

    - name: Display SSIDs to create
      ansible.builtin.debug:
        msg: "Creating {{ _ssids_to_create | length }} SSIDs: {{ _ssids_to_create | map(attribute='value.wifi_ssid') | list }}"

    - name: Create SSIDs
      ansible.builtin.command:
        cmd: >
          curl -sk -b {{ _cookie_file }}
          -H "Csrf-Token: {{ _omada_token }}"
          -H "Content-Type: application/json"
          -X POST "{{ _omada_url }}/{{ _omadac_id }}/api/v2/sites/{{ _site_id }}/setting/wlans/{{ _wlan_id }}/ssids"
          -d '{{ item | deevnet.net.omada_ssid_payload(deevnet_wifi_psk[item.key], guest=(item.key == "guest")) | to_json }}'
      loop: "{{ _ssids_to_create }}"
      loop_control:
        label: "{{ item.value.wifi_ssid }} → VLAN {{ item.value.vlan_id }}"
      register: _ssid_results
      changed_when: true
      failed_when: false
      no_log: true

    - name: Display results
      ansible.builtin.debug:
        msg: >-
          {{ '[PASS]' if (item.stdout | from_json).errorCode | default(-1) == 0 else '[FAIL]' }}
          {{ item.item.value.wifi_ssid }} (VLAN {{ item.item.value.vlan_id }}) —
          {{ (item.stdout | from_json).msg | default('unknown') }}
      loop: "{{ _ssid_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.value.wifi_ssid }}"
      when: _ssid_results.results is defined

    - name: Fail if any SSID creation failed
      ansible.builtin.fail:
        msg: "SSID creation failed: {{ item.item.value.wifi_ssid }} — {{ (item.stdout | from_json).msg }}"
      loop: "{{ _ssid_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.value.wifi_ssid }}"
      when:
        - _ssid_results.results is defined
        - (item.stdout | from_json).errorCode | default(-1) != 0

    # --- Cleanup ---
    - name: Remove session cookie file
      ansible.builtin.file:
        path: "{{ _cookie_file }}"
        state: absent

    - name: Summary
      ansible.builtin.debug:
        msg: "{{ _ssids_to_create | length }} SSIDs created. WiFi networks should broadcast within 60 seconds."
      when: _ssids_to_create | length > 0
