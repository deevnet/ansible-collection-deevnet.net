---
# Phase 2: Create VLANs in switch VLAN database
#
# Usage:
#   export SWITCH_USER="admin"
#   export SWITCH_PASSWORD="password"
#   export SWITCH_ENABLE_PASSWORD="enable-password"
#   make migration-switch-vlans
#
# Verify: SSH to switch -> show vlan brief
# Rollback: no vlan <id> for each created VLAN

- name: "Migration Phase 2: Create switch VLAN database"
  hosts: switches
  gather_facts: false
  tasks:
    - name: Create VLANs
      ansible.builtin.include_role:
        name: switch_vlans
        tasks_from: configure_vlans.yml
      tags: [vlans]

  handlers:
    - name: write memory
      ansible.netcommon.cli_command:
        command: "write memory"
