---
# Phase 2: Create VLANs in switch VLAN database
#
# Usage: make migration-switch-vlans
# Credentials come from inventory vault (group_vars/switches/vault.yml)
#
# Verify: SSH to switch -> show vlan brief
# Rollback: no vlan <id> for each created VLAN

- name: "Migration Phase 2: Create switch VLAN database"
  hosts: switches
  gather_facts: false
  tasks:
    - name: Create VLANs
      ansible.builtin.include_role:
        name: switch_vlans
        tasks_from: configure_vlans.yml
      tags: [vlans]

  handlers:
    - name: write memory
      ansible.netcommon.cli_command:
        command: "copy running-config startup-config"
