---
# Phase 1: Create VLAN interfaces on OPNsense
#
# Usage: make migration-opnsense-vlans
# Credentials come from inventory vault (group_vars/routers/vault.yml)
#
# Verify: OPNsense GUI -> Interfaces -> VLANs
# Rollback: Delete VLAN interfaces via OPNsense GUI

- name: "Migration Phase 1: Create OPNsense VLAN interfaces"
  hosts: dns_servers
  gather_facts: false
  roles:
    - opnsense_vlans
