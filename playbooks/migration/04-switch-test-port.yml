---
# Phase 4: Move one test port to a VLAN
#
# Moves a single access port to validate end-to-end VLAN connectivity
# before migrating remaining ports.
#
# Usage:
#   export SWITCH_USER="admin"
#   export SWITCH_PASSWORD="password"
#   export SWITCH_ENABLE_PASSWORD="enable-password"
#   make migration-switch-test-port
#
# Verify: Connect device to test port, check DHCP lease, ping gateway, ping internet
# Rollback: switchport access vlan 1 on test port

- name: "Migration Phase 4: Test single port VLAN assignment"
  hosts: switches
  gather_facts: false
  vars:
    # Override switch_ports to only configure the test port
    # Set test_port_interface and test_port_vlan_id in extra vars or host_vars
    switch_ports:
      access:
        - interface: "{{ test_port_interface | default('gigabitEthernet 1/0/24') }}"
          vlan_id: "{{ test_port_vlan_id | default(10) }}"
          description: "migration test port"
  tasks:
    - name: Configure test access port
      ansible.builtin.include_role:
        name: switch_vlans
        tasks_from: configure_access_ports.yml
      tags: [access]

  handlers:
    - name: write memory
      ansible.netcommon.cli_command:
        command: "write memory"
