---
# Phase 4: Move one test port to a VLAN
#
# Moves a single access port to validate end-to-end VLAN connectivity
# before migrating remaining ports.
#
# Usage: make migration-switch-test-port
# Credentials come from inventory vault (group_vars/switches/vault.yml)
#
# Verify: Connect device to test port, check DHCP lease, ping gateway, ping internet
# Rollback: switchport access vlan 1 on test port

- name: "Migration Phase 4: Test single port VLAN assignment"
  hosts: switches
  gather_facts: false
  vars:
    test_port_interface: "gigabitEthernet 1/0/24"
    test_port_vlan_id: 10
  tasks:
    # Build and send commands inline instead of include_role to avoid
    # variable scoping issues with switch_ports override.
    - name: Configure test access port
      ansible.netcommon.cli_command:
        command: "{{ item }}"
      loop:
        - "configure"
        - "interface {{ test_port_interface }}"
        - "switchport general allowed vlan {{ test_port_vlan_id }} untagged"
        - "switchport pvid {{ test_port_vlan_id }}"
        - "exit"
        - "end"
      changed_when: true
      notify: write memory

    - name: Show port status
      ansible.netcommon.cli_command:
        command: "show interface switchport {{ test_port_interface }}"
      register: port_output

    - name: Display port status
      ansible.builtin.debug:
        msg: "{{ port_output.stdout }}"

  handlers:
    - name: write memory
      ansible.netcommon.cli_command:
        command: "copy running-config startup-config"
