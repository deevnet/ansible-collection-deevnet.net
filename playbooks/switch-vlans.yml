---
# Ongoing switch VLAN management
#
# Applies full VLAN configuration (VLANs, trunks, access ports) to switches.
# Use for day-2 operations after initial migration is complete.
#
# Secrets are vaulted in inventory (group_vars/switches/vault.yml).
# Usage:
#   make switch    # prompts for vault password

- name: Configure switch VLANs
  hosts: switches
  gather_facts: false
  roles:
    - switch_vlans
