---
# Assign IP addresses and enable VLAN interfaces on OPNsense
#
# After VLANs are created, each VLAN sub-interface needs:
#   - An IP address assigned (the gateway IP from vlans.yml)
#   - The interface enabled
#
# This uses the OPNsense interfaces API to configure each VLAN interface.

# Step 1: Fetch updated VLAN list to get device names
- name: Get updated VLAN configuration
  ansible.builtin.uri:
    url: "{{ opnsense_api_url }}/interfaces/vlan_settings/searchItem"
    method: POST
    user: "{{ opnsense_api_key }}"
    password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: "{{ opnsense_validate_certs }}"
    body_format: json
    body: {}
    return_content: true
  register: updated_vlans
  delegate_to: localhost

# Step 2: Build VLAN tag -> device name mapping
- name: Build VLAN tag to device mapping
  ansible.builtin.set_fact:
    vlan_devices_by_tag: >-
      {{
        vlan_devices_by_tag | default({}) | combine({
          (item.tag | string): item.vlanif | default('')
        })
      }}
  loop: "{{ updated_vlans.json.rows | default([]) }}"
  loop_control:
    label: "VLAN {{ item.tag | default('?') }} -> {{ item.vlanif | default('?') }}"
  when:
    - item.tag is defined
    - item.vlanif is defined

- name: Ensure vlan_devices_by_tag is defined
  ansible.builtin.set_fact:
    vlan_devices_by_tag: {}
  when: vlan_devices_by_tag is not defined

# Step 3: Display VLAN device mappings
- name: Display VLAN interface mappings
  ansible.builtin.debug:
    msg: >-
      {{ item.key }}: VLAN {{ item.value.vlan_id }} ->
      {{ vlan_devices_by_tag[item.value.vlan_id | string] | default('NOT FOUND') }}
      ({{ item.value.gateway }}/24)
  loop: "{{ deevnet_vlans | dict2items }}"
  loop_control:
    label: "{{ item.key }}"

- name: Report interface configuration
  ansible.builtin.debug:
    msg: |
      VLAN interface configuration complete.
      Assign IP addresses and enable interfaces via OPNsense GUI:
        Interfaces -> Assignments -> Assign each VLAN device
        Then configure each with its gateway IP and /24 subnet.
      VLAN device mappings have been displayed above for reference.
