---
# Configure VLAN interface IPs on OPNsense
#
# OPNsense does not have an API for setting interface IPs (as of 25.7).
# The setInterface endpoint does not exist. Interface IP configuration
# must be done via the GUI.
#
# This task file:
#   1. Fetches current interface assignments
#   2. Checks which VLAN interfaces are missing IPs
#   3. Pauses with GUI instructions if any need configuration
#   4. Reconfigures interfaces to apply changes
#   5. Verifies gateway reachability

# Step 1: Fetch VLAN device -> tag mapping
- name: Get VLAN configuration
  ansible.builtin.uri:
    url: "{{ opnsense_api_url }}/interfaces/vlan_settings/searchItem"
    method: POST
    user: "{{ opnsense_api_key }}"
    password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: "{{ opnsense_validate_certs }}"
    body_format: json
    body: {}
    return_content: true
  register: updated_vlans
  delegate_to: localhost

- name: Build VLAN tag to device mapping
  ansible.builtin.set_fact:
    vlan_devices_by_tag: >-
      {{
        vlan_devices_by_tag | default({}) | combine({
          (item.tag | string): item.vlanif | default('')
        })
      }}
  loop: "{{ updated_vlans.json.rows | default([]) }}"
  loop_control:
    label: "VLAN {{ item.tag | default('?') }} -> {{ item.vlanif | default('?') }}"
  when:
    - item.tag is defined
    - item.vlanif is defined

- name: Ensure vlan_devices_by_tag is defined
  ansible.builtin.set_fact:
    vlan_devices_by_tag: {}
  when: vlan_devices_by_tag is not defined

# Step 2: Fetch current interface assignments
- name: Get current interface configuration
  ansible.builtin.uri:
    url: "{{ opnsense_api_url }}/interfaces/overview/export"
    method: GET
    user: "{{ opnsense_api_key }}"
    password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: "{{ opnsense_validate_certs }}"
    return_content: true
  register: interface_export
  delegate_to: localhost

# The export endpoint returns a JSON array with content-type text/html
- name: Parse interface export response
  ansible.builtin.set_fact:
    _interface_list: "{{ interface_export.content | from_json }}"

# Step 3: Build device -> interface info mapping
- name: Build device to interface identifier mapping
  ansible.builtin.set_fact:
    device_to_interface: >-
      {{
        device_to_interface | default({}) | combine({
          (item.device | default('')): {
            'identifier': item.identifier | default(''),
            'ipv4': item.addr4 | default(''),
            'enabled': item.enabled | default(false) | string
          }
        })
      }}
  loop: "{{ _interface_list }}"
  loop_control:
    label: "{{ item.identifier | default('?') }} -> {{ item.device | default('?') }}"
  when:
    - item.device is defined
    - item.identifier is defined

- name: Ensure device_to_interface is defined
  ansible.builtin.set_fact:
    device_to_interface: {}
  when: device_to_interface is not defined

# Step 4: Identify VLANs missing IPs
- name: Build list of VLANs needing IP configuration
  ansible.builtin.set_fact:
    _vlans_needing_ip: "{{ deevnet_vlans | deevnet.net.vlans_needing_ip(vlan_devices_by_tag, device_to_interface) }}"

- name: Show VLANs needing IP configuration
  ansible.builtin.debug:
    msg: "{{ _vlans_needing_ip | deevnet.net.format_vlans_needing_ip }}"
  when: _vlans_needing_ip | length > 0

- name: Pause for manual interface IP configuration
  ansible.builtin.pause:
    prompt: >-
      {{ _vlans_needing_ip | length }} VLAN interface(s) need IPs configured
      in OPNsense GUI. Press ENTER after configuring, or Ctrl+C to abort
  when: _vlans_needing_ip | length > 0

- name: All VLAN interfaces configured
  ansible.builtin.debug:
    msg: "[PASS] All {{ deevnet_vlans | dict2items | selectattr('value.gateway', 'defined') | list | length }} VLAN interfaces have correct IPs"
  when: _vlans_needing_ip | length == 0

# Step 5: Reload interfaces to apply
- name: Reload VLAN interfaces
  ansible.builtin.uri:
    url: "{{ opnsense_api_url }}/interfaces/overview/reloadInterface/{{ item.identifier }}"
    method: POST
    user: "{{ opnsense_api_key }}"
    password: "{{ opnsense_api_secret }}"
    force_basic_auth: true
    validate_certs: "{{ opnsense_validate_certs }}"
  loop: "{{ _vlans_needing_ip }}"
  loop_control:
    label: "{{ item.identifier }} ({{ item.name }})"
  when:
    - _vlans_needing_ip | length > 0
    - item.identifier != '?'
  delegate_to: localhost

# Step 6: Verify gateway reachability
- name: Verify VLAN gateways are reachable
  ansible.builtin.command:
    cmd: "ping -c 1 -W 3 {{ item.value.gateway }}"
  loop: "{{ deevnet_vlans | dict2items | selectattr('value.gateway', 'defined') | list }}"
  loop_control:
    label: "{{ item.key }} ({{ item.value.gateway }})"
  delegate_to: localhost
  register: gw_pings
  ignore_errors: true
  changed_when: false

- name: Report gateway reachability
  ansible.builtin.debug:
    msg: >-
      {{ '[PASS]' if item.rc == 0 else '[FAIL]' }}
      {{ item.item.key }} gateway {{ item.item.value.gateway }} —
      {{ 'reachable' if item.rc == 0 else 'UNREACHABLE' }}
  loop: "{{ gw_pings.results }}"
  loop_control:
    label: "{{ item.item.key }}"
