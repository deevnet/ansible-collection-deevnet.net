---
# Configure access ports with VLAN assignments
#
# TP-Link SG2218 uses "General" mode (no trunk/access distinction).
# Access-like behavior: single VLAN untagged + PVID.

- name: Build access port command list
  ansible.builtin.set_fact:
    _access_commands: |
      configure
      {% for port in switch_ports.access | default([]) %}
      interface {{ port.interface }}
      switchport general allowed vlan {{ port.vlan_id }} untagged
      switchport pvid {{ port.vlan_id }}
      {% if port.description is defined %}
      description {{ port.description | replace(' ', '-') }}
      {% endif %}
      no shutdown
      exit
      {% endfor %}
      end
  when: switch_ports.access | default([]) | length > 0

- name: Configure access ports
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop: "{{ _access_commands.strip().split('\n') | map('trim') | select | list }}"
  when: _access_commands is defined
  notify: write memory
  changed_when: true
  register: access_result

- name: Show access port assignments
  ansible.netcommon.cli_command:
    command: "show vlan brief"
  register: access_output
  when: switch_ports.access | default([]) | length > 0

- name: Display port VLAN assignments
  ansible.builtin.debug:
    msg: "{{ access_output.stdout }}"
  when: access_output is defined and access_output is not skipped
