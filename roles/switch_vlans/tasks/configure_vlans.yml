---
# Create VLANs from deevnet_vlans definitions
#
# Uses cli_command (not cli_config) because the TP-Link cliconf
# does not reliably support config diffing.

- name: Build VLAN command list
  ansible.builtin.set_fact:
    _vlan_commands: |
      configure
      {% for name, vlan in deevnet_vlans.items() %}
      vlan {{ vlan.vlan_id }}
      name {{ name }}
      exit
      {% endfor %}
      end

- name: Create VLANs
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop: "{{ _vlan_commands.strip().split('\n') | map('trim') | select | list }}"
  register: vlan_result
  notify: write memory
  changed_when: true

- name: Show VLAN configuration
  ansible.netcommon.cli_command:
    command: "show vlan brief"
  register: vlan_output

- name: Display VLAN status
  ansible.builtin.debug:
    msg: "{{ vlan_output.stdout }}"
