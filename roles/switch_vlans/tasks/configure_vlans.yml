---
# Create VLANs from deevnet_vlans definitions

- name: Build VLAN config block
  ansible.builtin.set_fact:
    vlan_config_lines: >-
      {{
        deevnet_vlans | dict2items | map('regex_replace', '^.*$', '') | list
      }}

- name: Create VLANs
  ansible.netcommon.cli_config:
    config: |
      {% for name, vlan in deevnet_vlans.items() %}
      vlan {{ vlan.vlan_id }}
        name {{ name }}
      {% endfor %}
  notify: write memory
  register: vlan_result

- name: Show VLAN configuration
  ansible.netcommon.cli_command:
    command: "show vlan brief"
  register: vlan_output

- name: Display VLAN status
  ansible.builtin.debug:
    msg: "{{ vlan_output.stdout_lines | default([]) }}"
    verbosity: 1
