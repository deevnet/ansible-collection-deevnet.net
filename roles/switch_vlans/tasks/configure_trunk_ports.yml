---
# Configure trunk ports with allowed VLANs
#
# TP-Link SG2218 uses "General" mode (no trunk/access distinction).
# Trunk-like behavior: tagged VLANs + untagged native VLAN + PVID.

- name: Build allowed VLAN list
  ansible.builtin.set_fact:
    all_vlan_ids: "{{ deevnet_vlans | dict2items | map(attribute='value.vlan_id') | list | join(',') }}"

- name: Build trunk port command list
  ansible.builtin.set_fact:
    _trunk_commands: |
      configure
      {% for port in switch_ports.trunk | default([]) %}
      {% set vlans = (port.allowed_vlans | join(',')) if port.allowed_vlans is defined else all_vlan_ids %}
      {% set native = port.native_vlan | default(switch_trunk_native_vlan) %}
      interface {{ port.interface }}
      switchport general allowed vlan {{ vlans }} tagged
      switchport general allowed vlan {{ native }} untagged
      switchport pvid {{ native }}
      {% if port.description is defined %}
      description {{ port.description | replace(' ', '-') }}
      {% endif %}
      no shutdown
      exit
      {% endfor %}
      end
  when: switch_ports.trunk | default([]) | length > 0

- name: Configure trunk ports
  ansible.netcommon.cli_command:
    command: "{{ item }}"
  loop: "{{ _trunk_commands.strip().split('\n') | map('trim') | select | list }}"
  when: _trunk_commands is defined
  notify: write memory
  changed_when: true
  register: trunk_result

- name: Show trunk port status
  ansible.netcommon.cli_command:
    command: "show interface switchport {{ switch_ports.trunk[0].interface }}"
  register: trunk_output
  when: switch_ports.trunk | default([]) | length > 0

- name: Display trunk status
  ansible.builtin.debug:
    msg: "{{ trunk_output.stdout }}"
  when: trunk_output is defined and trunk_output is not skipped
