---
# Main entry point for opnsense_firewall role
#
# Configures zone-based firewall rules on OPNsense via REST API.
# Input variables:
#   deevnet_vlans: dict of VLAN definitions (from group_vars/all/vlans.yml)
#   firewall_zone_policies: list of inter-zone allow rules (from group_vars/all/firewall.yml)
#   firewall_internet_zones: list of zones with internet access
#   opnsense_api_key / opnsense_api_secret: API credentials

- name: Validate required variables
  ansible.builtin.assert:
    that:
      - opnsense_api_key is defined
      - opnsense_api_key | length > 0
      - opnsense_api_secret is defined
      - opnsense_api_secret | length > 0
      - deevnet_vlans is defined
      - deevnet_vlans | length > 0
      - firewall_zone_policies is defined
      - firewall_zone_policies | length > 0
    fail_msg: >-
      Required variables missing. Ensure opnsense_api_key, opnsense_api_secret,
      deevnet_vlans, and firewall_zone_policies are set.

- name: Discover VLAN interface mappings
  ansible.builtin.include_tasks: discover_interfaces.yml

- name: Configure firewall rules
  ansible.builtin.include_tasks: configure_rules.yml
